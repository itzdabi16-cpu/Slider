<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
            transition: 0.5s;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #ff4d6d;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        #loading {
            display: none;
        }

        #prankCard {
            display: none;
            animation: pop 0.4s ease;
        }

        #prankCard img {
            width: 100%;
            border-radius: 15px;
            margin-top: 15px;
            box-shadow: 0 0 20px rgba(255,0,0,0.6);
        }

        @keyframes pop {
            from { transform: scale(0.7); }
            to { transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="card" id="mainCard">
    <h2>You are special ❤️</h2>
    <p>I made a cute surprise for you 😊</p>
    <button onclick="startPrank()">Open 💖</button>
</div>

<div class="card" id="loading">
    <h3>Preparing something cute... ⏳</h3>
</div>

<div class="card" id="prankCard">
    <h2>😈 GOT YOU!</h2>

    <!-- 🔥 CHANGE YOUR IMAGE HERE -->
    <img src="1000016641.png" alt="prank image">

</div>

<audio id="sound" src="scream.mp3"></audio>

<script>
function startPrank() {
    document.getElementById("mainCard").style.display = "none";
    document.getElementById("loading").style.display = "block";⁸

    setTimeout(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("prankCard").style.display = "block";

        document.getElementById("sound").play();
    }, 2000);
}
</script>

</body>
</html>
